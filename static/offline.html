<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Erfassung Offline</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="is-mobile">
  <main class="page">
    <section class="mobile-dashboard">
      <header class="mobile-dashboard__header">
        <h1 class="mobile-dashboard__title">Erfassung (Offline)</h1>
        <p>Die App ist offline gestartet. Sobald Server und Anmeldung verfügbar sind, werden Daten synchronisiert.</p>
      </header>
      <aside class="mobile-queue" style="display:block">
        <span class="mobile-badge mobile-badge--queued">ℹ️</span>
        <span>Bitte die App einmal online öffnen, um Benutzerdaten lokal zu initialisieren.</span>
      </aside>
    </section>
  </main>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
