{% extends "base.html" %}
{% block title %}Anmeldung – Erfassung{% endblock %}
{% block content %}
<section class="login-card">
    <h1>Anmelden</h1>
    <p>Bitte melden Sie sich mit Benutzername und Kennwort an.</p>
    <form method="post" action="/login" class="login-form">
        <input type="hidden" name="csrf_token" value="{{ get_csrf_token(request) }}">
        <label for="username">Benutzername</label>
        <input id="username" type="text" name="username" required autofocus>
        <label for="password">Kennwort</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required>
        <button type="submit" class="button primary full-width">Anmelden</button>
    </form>
</section>
{% endblock %}
