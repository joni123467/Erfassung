{% extends "base.html" %}
{% block title %}Kennwort ändern – Erfassung{% endblock %}
{% block content %}
<section class="card" style="max-width: 560px; margin: 0 auto;">
    <div class="card-header">
        <h1>Kennwort ändern</h1>
    </div>
    <div class="card-body">
        {% if user.must_change_password %}
            <p>Aus Sicherheitsgründen müssen Sie Ihr Kennwort vor der weiteren Nutzung ändern.</p>
        {% endif %}
        <form method="post" action="/account/password" class="user-form">
            <label>
                Aktuelles Kennwort
                <input type="password" name="current_password" autocomplete="current-password" required>
            </label>
            <label>
                Neues Kennwort
                <input type="password" name="new_password" autocomplete="new-password" required>
                <span class="form-hint">Mindestens 10 Zeichen inkl. Groß-/Kleinbuchstaben, Zahl und Sonderzeichen.</span>
            </label>
            <label>
                Neues Kennwort wiederholen
                <input type="password" name="confirm_password" autocomplete="new-password" required>
            </label>
            <button type="submit" class="button primary">Kennwort speichern</button>
        </form>
    </div>
</section>
{% endblock %}
